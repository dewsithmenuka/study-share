<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyShare</title>
    <link href="https://fonts.bunny.net/css?family=figtree:400,500,600,700,800&display=swap" rel="stylesheet" />
</head>
<body>
    <div id="app"></div>
    <script type="module">
        // Try to load with dynamic import - this finds any app-*.js file
        const appFiles = ['app-DFR-xPtY.js', 'app.js', 'main.js'];
        for (const file of appFiles) {
            try {
                await import('/dist/assets/' + file);
                break;
            } catch(e) { continue; }
        }
    </script>
</body>
</html>
